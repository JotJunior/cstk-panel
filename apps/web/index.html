<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('cstk-theme');
          if (stored === 'light' || stored === 'dark') {
            document.documentElement.dataset.theme = stored;
          } else {
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.dataset.theme = prefersDark ? 'dark' : 'light';
          }
        } catch (e) {
          // localStorage bloqueado: fallback para dark (default do sistema)
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/cstk-logo.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>cstk-panel — Observabilidade</title>
    <meta name="description" content="Dashboard de observabilidade read-only para o toolkit cstk" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
